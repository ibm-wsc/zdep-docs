name: Sync to Public Repository

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ibm-x86-64-small
    steps:
      - name: Checkout internal repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove internal workflows before sync
        run: |
          git rm -r --cached .github/workflows/deploy-internal.yml .github/workflows/sync-to-public.yml || true
          git commit -m "Remove internal workflows for public sync" || true

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/ibm-wsc/zdep-docs.git
          git push public HEAD:main --force